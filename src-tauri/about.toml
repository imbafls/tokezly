# cargo-about configuration for generating Tokezly's Rust third-party notices.
# Run from src-tauri/:
#   cargo about generate about.hbs -o resources/licenses/rust-dependencies-LICENSES.txt

# Tokezly ships a Windows x64 build, so resolve licenses for that target only.
# This excludes platform-specific dependencies (e.g. the macOS-only tauri-nspanel)
# that are never compiled into the shipped artifact.
targets = ["x86_64-pc-windows-msvc"]

accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "Unlicense",
    "0BSD",
    "CDLA-Permissive-2.0",
    "WTFPL",
    "NCSA",
]
